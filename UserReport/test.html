document.getElementById('subBtn').style.visibility = 'hidden'; form1.submit();

function init(){
	if(ipAddr.length > 0){
		var obj=document.getElementById('ips')
		if(obj){
			obj.innerHTML = 'IP:&nbsp;' + ipAddr;
			obj.style.visibility = 'visible';
		}
	}
	/*
	var objOld = document.getElementById('cbox1');
	var objNew = objOld.cloneNode(true);

	document.getElementById('cbox4t').innerHTML = CBOX4;
	document.getElementById('cbox5t').innerHTML = CBOX5;
	document.getElementById('cbox6t').innerHTML = CBOX6;
	if(document.body.style.zoom != null){
		var siz = getSizes();
		if(siz.winWide > siz.winHigh)
			document.body.style.zoom = siz.winWide / 400.0;
		else
			document.body.style.zoom = siz.winHigh / 300.0;
	}
	SFtb();
}
function getSizes(){
	var sWide = screen.width;
	var sHigh = screen.height;
	var wWide, wHigh;
	if(document.body && document.body.offsetWidth){
		wWide = document.body.offsetWidth;
		wHigh = document.body.offsetHeight;
	}
	if((document.compatMode == 'CSS1Compat') && document.documentElement && 
	 document.documentElement.offsetWidth){
		wWide = document.documentElement.offsetWidth;
		wHigh = document.documentElement.offsetHeight;
	}
	if(window.innerWidth && window.innerHeight){
		wWide = window.innerWidth;
		wHigh = window.innerHeight;
	}
	if(!wWide || (wWide == 'undefined'))
		wWide = sWide;
	if(!wHigh || (wHigh == 'undefined'))
		wHigh = sHigh;
	return { winWide:wWide,winHigh:wHigh,scrnWide:sWide,scrnHigh:sHigh };
}
